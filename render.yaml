# One-click deploy blueprint for Render (https://render.com).
# In Render: New → Blueprint → point at this repo. Free tier works; add the
# persistent disk below so accounts and drafts survive restarts/deploys.
services:
  - type: web
    name: fantasy-football-lab
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips="*"
    envVars:
      - key: FFL_DATA_DIR
        value: /var/data
      - key: FFL_SECURE_COOKIES
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.7"
    disk:
      name: ffl-data
      mountPath: /var/data
      sizeGB: 1
